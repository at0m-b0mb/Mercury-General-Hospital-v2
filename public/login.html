<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Mercury General Hospital</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-body">
    <!-- Hint: Try default credentials. The system hasn't been hardened. -->
    <!-- Known working format: username=admin&password=admin -->
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-logo">
                <span>🏥</span>
                <h1>Mercury General</h1>
                <p>Staff Portal Login</p>
            </div>

            <div id="login-error" class="alert alert-error" style="display:none;"></div>
            <div id="login-success" class="alert alert-success" style="display:none;"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <div class="login-links">
                <a href="/">← Back to Home</a>
                <a href="#" onclick="showHint()">Forgot Password?</a>
            </div>

            <div id="hint-box" class="hint-box" style="display:none;">
                <p><strong>IT Note:</strong> Default credentials for the admin account have not been changed since installation. Contact IT support at ext. 4477.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const errorDiv = document.getElementById('login-error');
            const successDiv = document.getElementById('login-success');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    successDiv.textContent = 'Login successful! Redirecting...';
                    successDiv.style.display = 'block';
                    localStorage.setItem('mgh_token', data.token);
                    localStorage.setItem('mgh_user', username);
                    setTimeout(() => { window.location.href = '/dashboard'; }, 1000);
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });

        function showHint() {
            document.getElementById('hint-box').style.display = 'block';
        }
    </script>
</body>
</html>
